<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#c62828">
    <title>The Seven Simulation</title>

    <!-- Galmuri 픽셀폰트 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css">

    <style>
        :root {
            /* TheSevenRPG 컬러 팔레트 (동일) */
            --bg-primary: #0a0a12;
            --bg-secondary: #12121e;
            --bg-tertiary: #1a1a2a;
            --bg-card: #161624;
            --bg-input: #0e0e1a;
            --border-primary: #303048;
            --border-secondary: #484868;
            --border-highlight: #6868a0;
            --border-light: #a0a0c0;
            --border-dark: #18182a;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0c0;
            --text-muted: #606080;
            --text-accent: #e03030;
            --color-success: #40d870;
            --color-warning: #f8b830;
            --color-error: #f04040;
            --color-info: #40a0f8;

            /* 죄종 컬러 */
            --sin-wrath: #e03030;
            --sin-envy: #30b050;
            --sin-greed: #d0a020;
            --sin-sloth: #808898;
            --sin-gluttony: #e07020;
            --sin-lust: #e03080;
            --sin-pride: #8040e0;

            /* RPG 3D 베벨 */
            --rpg-border-outset:
                inset -2px -2px 0 0 var(--border-dark),
                inset 2px 2px 0 0 var(--border-highlight),
                0 0 0 2px var(--border-primary);
            --rpg-border-inset:
                inset 2px 2px 0 0 var(--border-dark),
                inset -2px -2px 0 0 var(--border-highlight),
                0 0 0 2px var(--border-primary);

            /* 폰트 */
            --font-main: 'Galmuri14', 'Galmuri11', monospace;
            --font-bold: 'Galmuri14', 'Galmuri11', monospace;

            /* 사이즈 */
            --font-size-xs: 9px;
            --font-size-sm: 11px;
            --font-size-md: 14px;
            --font-size-lg: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: var(--font-main);
        }

        #game-container {
            /* Phaser Scale.FIT이 16:9 비율 유지하면서 최대 크기로 채움 */
        }

        #game-container canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="game-container" style="position: relative;"></div>

    <!-- Phaser.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

    <!-- 게임 진입점 -->
    <script type="module" src="app.js"></script>
</body>
</html>
