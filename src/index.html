<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#c62828">
    <title>The Seven Simulation</title>

    <!-- Galmuri 픽셀폰트 (TheSevenRPG 동일) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri/dist/galmuri.css">

    <style>
        :root {
            /* TheSevenRPG 컬러 팔레트 */
            --bg-primary: #0a0a12;
            --bg-secondary: #12121e;
            --bg-tertiary: #1a1a2a;
            --border-primary: #303048;
            --border-secondary: #484868;
            --border-highlight: #a0a0c0;
            --border-dark: #18182a;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0c0;
            --text-muted: #606080;
            --accent-red: #e03030;

            /* 죄종 컬러 */
            --sin-wrath: #e03030;
            --sin-envy: #30b050;
            --sin-greed: #d0a020;
            --sin-sloth: #808898;
            --sin-gluttony: #e07020;
            --sin-lust: #e03080;
            --sin-pride: #8040e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Galmuri11', 'Galmuri9', monospace;
            -webkit-font-smoothing: none;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #game-container {
            /* 3D 베벨 보더 (TheSevenRPG 스타일) */
            border: 2px solid var(--border-primary);
            box-shadow:
                inset 1px 1px 0 var(--border-highlight),
                inset -1px -1px 0 var(--border-dark),
                4px 4px 0 rgba(0, 0, 0, 0.5),
                0 0 20px rgba(224, 48, 48, 0.2);
        }

        /* CRT 스캔라인 오버레이 */
        #game-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent 1px,
                rgba(0, 0, 0, 0.06) 1px,
                rgba(0, 0, 0, 0.06) 2px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="game-container" style="position: relative;"></div>

    <!-- Phaser.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

    <!-- 게임 진입점 -->
    <script type="module" src="app.js"></script>
</body>
</html>
